# Netlify deployment config for the HANSA web app.
# See /app/DEPLOY.md for the full deployment guide.
[build]
  base = "frontend"
  command = "yarn build:web"
  publish = "frontend/dist"

# Headers that ensure the service worker + manifest are never served stale.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json"

# SPA fallback so client-side routes resolve correctly on direct hits.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
